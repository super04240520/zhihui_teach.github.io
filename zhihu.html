<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="description" content="一个带知识点问答的泡泡消除小游戏，点击泡泡答题并累计积分。">
    <title>泡泡消除智能体 - 游戏化学习</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        :root {
            color-scheme: only light;
        }

        body {
            min-height: 100vh;
            background:
                radial-gradient(circle at 20% 15%, rgba(255, 236, 180, 0.28), transparent 22%),
                radial-gradient(circle at 80% 10%, rgba(255, 170, 196, 0.22), transparent 20%),
                radial-gradient(circle at 50% 100%, rgba(102, 195, 255, 0.2), transparent 35%),
                linear-gradient(160deg, #120f3d 0%, #1a2a71 38%, #144a74 72%, #0b3854 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: "Segoe UI", "Poppins", "Roboto", sans-serif;
            color: #f7fbff;
            line-height: 1.5;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        body::before,
        body::after {
            content: "";
            position: fixed;
            inset: auto;
            width: 360px;
            height: 360px;
            border-radius: 50%;
            pointer-events: none;
            filter: blur(18px);
            opacity: 0.6;
        }

        body::before {
            top: -90px;
            right: -120px;
            background: radial-gradient(circle, rgba(255, 173, 210, 0.58) 0%, rgba(255, 173, 210, 0) 70%);
        }

        body::after {
            left: -140px;
            bottom: -120px;
            background: radial-gradient(circle, rgba(122, 222, 255, 0.48) 0%, rgba(122, 222, 255, 0) 72%);
        }

        button,
        input {
            font: inherit;
        }

        input,
        textarea {
            user-select: text;
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        .game-container {
            width: min(100%, 860px);
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.24), rgba(255, 255, 255, 0.1)),
                linear-gradient(160deg, rgba(255, 244, 210, 0.08), rgba(255, 192, 222, 0.06));
            backdrop-filter: blur(12px);
            border-radius: 42px;
            padding: 28px 28px 32px;
            box-shadow:
                0 32px 60px rgba(2, 8, 26, 0.45),
                inset 0 1px 0 rgba(255, 255, 255, 0.6),
                inset 0 -18px 34px rgba(11, 15, 44, 0.22);
            border: 1px solid rgba(255, 255, 255, 0.22);
            position: relative;
            overflow: hidden;
        }

        .game-container::before,
        .game-container::after {
            content: "";
            position: absolute;
            pointer-events: none;
        }

        .game-container::before {
            inset: 14px;
            border-radius: 34px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.03)),
                radial-gradient(circle at top, rgba(255, 255, 255, 0.14), transparent 48%);
            z-index: 0;
        }

        .game-container::after {
            top: -60px;
            right: -10px;
            width: 220px;
            height: 220px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.18) 0%, rgba(255, 255, 255, 0) 70%);
            transform: rotate(12deg);
        }

        .game-container > * {
            position: relative;
            z-index: 1;
        }

        .game-header {
            text-align: center;
            margin-bottom: 26px;
            padding: 18px 18px 20px;
            border-radius: 28px;
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.18), rgba(255, 255, 255, 0.08)),
                linear-gradient(145deg, rgba(132, 74, 255, 0.25), rgba(255, 180, 190, 0.12));
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.56),
                0 16px 28px rgba(11, 13, 34, 0.26);
            border: 1px solid rgba(255, 255, 255, 0.16);
        }

        .game-eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            padding: 7px 14px;
            border-radius: 999px;
            background: linear-gradient(135deg, rgba(255, 228, 134, 0.96), rgba(255, 162, 102, 0.96));
            color: #55340b;
            box-shadow: 0 8px 16px rgba(77, 36, 9, 0.18);
            font-size: 0.82rem;
            font-weight: 800;
            letter-spacing: 0.08em;
        }

        .game-title {
            font-size: clamp(2.1rem, 5vw, 3rem);
            line-height: 1.1;
            letter-spacing: 0.03em;
            text-shadow: 0 8px 18px rgba(25, 10, 73, 0.28);
        }

        .game-subtitle {
            max-width: 560px;
            margin: 12px auto 0;
            color: rgba(247, 251, 255, 0.92);
            font-size: 1rem;
        }

        .game-meta {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 16px;
        }

        .meta-pill {
            padding: 8px 14px;
            border-radius: 999px;
            background: rgba(13, 18, 50, 0.28);
            border: 1px solid rgba(255, 255, 255, 0.18);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.22);
            color: rgba(255, 247, 250, 0.95);
            font-size: 0.82rem;
        }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.18), rgba(255, 255, 255, 0.08)),
                linear-gradient(135deg, rgba(16, 26, 61, 0.86), rgba(25, 52, 98, 0.9));
            border-radius: 28px;
            padding: 16px 18px;
            margin-bottom: 28px;
            backdrop-filter: blur(8px);
            box-shadow:
                inset 0 1px 3px rgba(255, 255, 255, 0.28),
                0 10px 22px rgba(0, 0, 0, 0.18);
            border: 1px solid rgba(255, 255, 255, 0.14);
        }

        .score-box {
            background: linear-gradient(135deg, #ffe388, #ffb357);
            padding: 10px 18px;
            border-radius: 22px;
            font-weight: 700;
            font-size: 1.6rem;
            color: #2d1b00;
            box-shadow:
                inset 0 1px 3px rgba(255, 255, 170, 0.88),
                inset 0 -6px 8px rgba(176, 80, 8, 0.18),
                0 10px 16px rgba(0, 0, 0, 0.22);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .score-box span:first-child {
            font-size: 1.05rem;
            background: #ffffff60;
            padding: 4px 12px;
            border-radius: 999px;
        }

        .score-box span:last-child {
            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
            font-weight: 800;
            letter-spacing: 1px;
        }

        .bubbles-left {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.18), rgba(160, 221, 255, 0.12));
            padding: 10px 18px;
            border-radius: 22px;
            color: white;
            font-weight: 700;
            font-size: 1.1rem;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.24);
        }

        .display-zone {
            padding: 18px 18px 12px;
            border-radius: 30px;
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.13), rgba(255, 255, 255, 0.04)),
                linear-gradient(160deg, rgba(105, 89, 255, 0.15), rgba(110, 226, 255, 0.08));
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.28),
                0 16px 24px rgba(5, 11, 28, 0.18);
        }

        .zone-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 16px;
            padding: 0 4px;
        }

        .zone-title {
            font-size: 1rem;
            font-weight: 800;
            letter-spacing: 0.04em;
            color: rgba(255, 248, 252, 0.96);
        }

        .zone-badge {
            padding: 7px 12px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.14);
            border: 1px solid rgba(255, 255, 255, 0.14);
            font-size: 0.78rem;
            color: rgba(255, 244, 248, 0.92);
        }

        .bubbles-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(142px, 1fr));
            gap: 26px 20px;
            padding: 12px 4px 18px;
            max-width: 760px;
            margin: 0 auto;
        }

        .bubble {
            appearance: none;
            aspect-ratio: 1 / 1;
            width: 100%;
            min-height: 142px;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.26), rgba(255, 255, 255, 0.06));
            border-radius: 44% 44% 47% 47% / 48% 48% 42% 42%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-weight: 700;
            font-size: 1rem;
            color: #2c3e2f;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
            box-shadow:
                0 16px 28px rgba(3, 10, 28, 0.32),
                inset 0 1px 0 rgba(255, 255, 255, 0.68),
                inset 0 -12px 16px rgba(19, 28, 53, 0.14);
            backdrop-filter: blur(8px);
            padding: 14px;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.34);
            overflow: hidden;
            animation: bubbleFloat 4.6s ease-in-out infinite;
            animation-delay: var(--float-delay, 0s);
        }

        @keyframes bubbleFloat {
            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-8px);
            }
        }

        .bubble::before,
        .bubble::after {
            content: "";
            position: absolute;
            pointer-events: none;
        }

        .bubble::before {
            inset: 12px;
            border-radius: 40%;
            background: var(--capsule-gradient, radial-gradient(circle at 30% 30%, #6bc9ff, #2a6f9c));
            box-shadow:
                inset 0 12px 16px rgba(255, 255, 255, 0.28),
                inset 0 -10px 12px rgba(25, 17, 38, 0.18);
            z-index: 0;
        }

        .bubble::after {
            top: 14px;
            left: 28px;
            width: 34%;
            height: 20%;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.95), rgba(255, 255, 255, 0.08));
            border-radius: 999px;
            transform: rotate(-16deg);
            opacity: 0.82;
        }

        .bubble:hover {
            transform: translateY(-4px) scale(1.04);
            box-shadow:
                0 22px 34px rgba(2, 9, 26, 0.42),
                inset 0 1px 0 rgba(255, 255, 255, 0.68),
                inset 0 -14px 18px rgba(19, 28, 53, 0.16);
            filter: brightness(1.03) saturate(1.05);
        }

        .bubble:active {
            transform: scale(0.98);
        }

        .bubble:focus-visible,
        .modal-btn:focus-visible,
        .reset-btn:focus-visible,
        .modal-input:focus-visible {
            outline: 3px solid rgba(255, 255, 255, 0.9);
            outline-offset: 3px;
        }

        .bubble-name {
            position: relative;
            z-index: 1;
            font-weight: 800;
            font-size: 1rem;
            background: rgba(15, 16, 31, 0.34);
            padding: 6px 10px;
            border-radius: 999px;
            color: white;
            text-shadow: 0 1px 1px rgba(0, 0, 0, 0.6);
            margin-bottom: 6px;
            width: 100%;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.18);
        }

        .bubble-sub {
            position: relative;
            z-index: 1;
            font-size: 0.74rem;
            background: rgba(255, 255, 255, 0.92);
            padding: 4px 10px;
            border-radius: 999px;
            color: #1f3e48;
            font-weight: 600;
            box-shadow: 0 6px 12px rgba(16, 23, 43, 0.12);
        }

        .bubble[data-type="编程"] {
            --capsule-gradient: radial-gradient(circle at 30% 30%, #91e5ff, #3475ff);
        }

        .bubble[data-type="数学"] {
            --capsule-gradient: radial-gradient(circle at 30% 30%, #ffbf98, #ff6d6b);
        }

        .bubble[data-type="科学"] {
            --capsule-gradient: radial-gradient(circle at 30% 30%, #bcffcb, #34b68f);
        }

        .bubble[data-type="语言"] {
            --capsule-gradient: radial-gradient(circle at 30% 30%, #ffc3e1, #d55de2);
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 40px 24px;
            color: white;
            font-weight: 700;
            font-size: 1.2rem;
            border-radius: 28px;
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.16), rgba(255, 255, 255, 0.05)),
                rgba(10, 23, 31, 0.22);
            border: 1px dashed rgba(255, 255, 255, 0.26);
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
            padding: 20px;
            z-index: 1000;
            font-family: "Segoe UI", system-ui, sans-serif;
        }

        .modal-card {
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(255, 247, 224, 0.96)),
                #fef7e0;
            max-width: 440px;
            width: min(100%, 440px);
            border-radius: 36px;
            padding: 28px 24px 32px;
            text-align: center;
            color: #2c3e2f;
            box-shadow:
                0 24px 42px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.85);
            animation: popIn 0.25s cubic-bezier(0.34, 1.2, 0.8, 1);
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.9);
        }

        .modal-card::before {
            content: "LIMITED DROP";
            position: absolute;
            top: 18px;
            right: -34px;
            padding: 8px 40px;
            background: linear-gradient(135deg, #ff8f7d, #ff5aa5);
            color: white;
            font-size: 0.72rem;
            font-weight: 800;
            letter-spacing: 0.08em;
            transform: rotate(24deg);
            box-shadow: 0 6px 12px rgba(127, 34, 78, 0.28);
        }

        @keyframes popIn {
            from {
                transform: scale(0.85);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .modal-card h2 {
            font-size: 1.8rem;
            color: #5a2be0;
            margin-bottom: 12px;
            text-shadow: 0 6px 12px rgba(129, 98, 255, 0.12);
        }

        .modal-bubble-name {
            font-weight: 700;
            background: linear-gradient(135deg, #ffe59f, #ffc8b5);
            border-radius: 999px;
            padding: 8px 14px;
            display: inline-block;
            margin-bottom: 12px;
            box-shadow: 0 8px 14px rgba(188, 126, 76, 0.18);
        }

        .modal-question {
            background: linear-gradient(180deg, #fff4cd, #fff7e5);
            padding: 20px 16px;
            border-radius: 28px;
            font-size: 1.15rem;
            font-weight: 600;
            margin: 15px 0;
            color: #2c3e2f;
            border: 1px solid rgba(255, 203, 111, 0.42);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.76);
        }

        .modal-form {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .modal-input {
            width: 100%;
            padding: 14px 18px;
            font-size: 1rem;
            border-radius: 999px;
            border: 2px solid #ffb347;
            outline: none;
            margin: 10px 0 0;
            text-align: center;
            font-weight: 500;
            background: #fffdf7;
            box-shadow: inset 0 2px 6px rgba(229, 177, 77, 0.12);
        }

        .modal-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .modal-btn {
            border: none;
            background: #ffb347;
            padding: 10px 24px;
            border-radius: 999px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.1s linear, filter 0.1s linear;
            box-shadow:
                0 8px 14px rgba(0, 0, 0, 0.16),
                inset 0 1px 0 rgba(255, 255, 255, 0.36);
        }

        .modal-btn.confirm {
            background: linear-gradient(135deg, #59e890, #21bf73);
            color: white;
        }

        .modal-btn.cancel {
            background: linear-gradient(135deg, #ffaf62, #ff7f50);
            color: white;
        }

        .modal-btn:hover {
            filter: brightness(0.96);
            transform: scale(0.97);
        }

        .feedback {
            font-size: 0.95rem;
            margin-top: 12px;
            min-height: 2.5rem;
            font-weight: 700;
        }

        .win-message {
            background: linear-gradient(135deg, #ffe36d, #ff9b52);
            margin-top: 15px;
            padding: 14px 18px;
            border-radius: 999px;
            font-weight: 700;
            color: #1f4f2b;
            text-align: center;
            box-shadow: 0 12px 20px rgba(0, 0, 0, 0.2);
        }

        .reset-btn {
            background: linear-gradient(135deg, #9d79ff, #5a7dff);
            border: none;
            color: white;
            padding: 13px 28px;
            border-radius: 999px;
            font-size: 1rem;
            font-weight: 700;
            margin: 24px auto 0;
            display: block;
            cursor: pointer;
            transition: transform 0.1s linear, background 0.1s linear;
            box-shadow:
                0 14px 20px rgba(30, 40, 98, 0.28),
                inset 0 1px 0 rgba(255, 255, 255, 0.36);
            letter-spacing: 0.03em;
        }

        .reset-btn:hover {
            background: linear-gradient(135deg, #8f68ff, #4568f2);
            transform: scale(0.98);
        }

        footer {
            text-align: center;
            margin-top: 18px;
            color: rgba(233, 243, 255, 0.82);
            font-size: 0.82rem;
            letter-spacing: 0.02em;
        }

        @media (max-width: 640px) {
            body {
                padding: 14px;
            }

            .game-container {
                border-radius: 32px;
                padding: 22px 18px 24px;
            }

            .game-header,
            .stats-bar {
                border-radius: 24px;
            }

            .stats-bar,
            .zone-header {
                flex-direction: column;
            }

            .score-box,
            .bubbles-left {
                width: 100%;
                justify-content: center;
            }

            .bubbles-grid {
                grid-template-columns: repeat(2, minmax(122px, 1fr));
                gap: 18px 14px;
            }

            .modal-card {
                border-radius: 28px;
                padding: 24px 18px 26px;
            }
        }
    </style>
</head>
<body>
<main class="game-container" aria-labelledby="gameTitle">
    <header class="game-header">
        <p class="game-eyebrow">🧠 游戏化学习挑战</p>
        <h1 id="gameTitle" class="game-title">泡泡消除智能体</h1>
        <p class="game-subtitle">点击泡泡回答知识点问题，答对即可获得积分并消除泡泡。</p>
        <div class="game-meta" aria-hidden="true">
            <span class="meta-pill">Series 01 · 收藏展示舱</span>
            <span class="meta-pill">限时开盒 · 知识胶囊</span>
        </div>
    </header>

    <section class="stats-bar" aria-label="游戏状态">
        <div class="score-box" aria-live="polite">
            <span>🏆 积分</span>
            <span id="scoreValue">0</span>
        </div>
        <div class="bubbles-left" aria-live="polite">
            💭 剩余泡泡: <span id="bubblesCount">0</span>
        </div>
    </section>

    <p id="gameInstructions" class="sr-only">使用鼠标点击或键盘聚焦后按回车，打开泡泡题目并输入答案。</p>
    <section class="display-zone" aria-describedby="gameInstructions" aria-label="知识点泡泡列表">
        <div class="zone-header" aria-hidden="true">
            <div class="zone-title">今日盲盒胶囊陈列架</div>
            <div class="zone-badge">Tap to Open</div>
        </div>
        <div id="bubblesGrid" class="bubbles-grid">
            <!-- 动态生成泡泡 -->
        </div>
    </section>

    <button id="resetGameBtn" type="button" class="reset-btn">✨ 重置所有泡泡 ✨</button>
    <footer>🎓 点击泡泡 → 完成知识点挑战 → 获得积分并消除。</footer>
</main>

<div
    id="questionModal"
    class="modal"
    role="dialog"
    aria-modal="true"
    aria-hidden="true"
    aria-labelledby="modalTitle"
    aria-describedby="modalQuestion"
>
    <div class="modal-card">
        <h2 id="modalTitle">📘 知识点挑战</h2>
        <div id="modalBubbleName" class="modal-bubble-name"></div>
        <form id="answerForm" class="modal-form" novalidate>
            <div id="modalQuestion" class="modal-question">问题加载中...</div>
            <label for="answerInput" class="sr-only">输入你的答案</label>
            <input
                type="text"
                id="answerInput"
                class="modal-input"
                placeholder="输入你的答案..."
                autocomplete="off"
            >
            <div class="modal-buttons">
                <button id="submitAnswerBtn" type="submit" class="modal-btn confirm">✓ 消除泡泡</button>
                <button id="closeModalBtn" type="button" class="modal-btn cancel">✗ 暂不挑战</button>
            </div>
        </form>
        <div id="modalFeedback" class="feedback" aria-live="polite"></div>
    </div>
</div>

<script>
    const KNOWLEDGE_BUBBLES = [
        { id: 1, name: "Python变量", category: "编程", question: "Python中，将整数5赋值给变量x的正确语句是？", answer: "x = 5", points: 10 },
        { id: 2, name: "for循环", category: "编程", question: "Python中遍历列表 items 的循环关键字是？", answer: "for", points: 10 },
        { id: 3, name: "勾股定理", category: "数学", question: "直角三角形直角边3和4，斜边长多少？", answer: "5", points: 10 },
        { id: 4, name: "一元二次方程", category: "数学", question: "方程 x² - 5x + 6 = 0 的一个根是2，另一个根是？", answer: "3", points: 12 },
        { id: 5, name: "光合作用", category: "科学", question: "植物光合作用释放的气体是什么？", answer: "氧气", points: 10 },
        { id: 6, name: "细胞核", category: "科学", question: "细胞的“控制中心”是哪个结构？", answer: "细胞核", points: 10 },
        { id: 7, name: "成语接龙", category: "语言", question: "成语“画蛇添足”的“足”指的是什么？", answer: "脚", points: 8 },
        { id: 8, name: "英语过去式", category: "语言", question: "单词 go 的过去式是什么？", answer: "went", points: 8 }
    ];

    let activeBubbles = [];
    let currentScore = 0;
    let currentSelectedBubble = null;
    let lastFocusedElement = null;
    let closeModalTimer = null;

    const bubblesGrid = document.getElementById("bubblesGrid");
    const scoreSpan = document.getElementById("scoreValue");
    const bubblesCountSpan = document.getElementById("bubblesCount");
    const resetBtn = document.getElementById("resetGameBtn");
    const modal = document.getElementById("questionModal");
    const modalBubbleNameSpan = document.getElementById("modalBubbleName");
    const modalQuestionDiv = document.getElementById("modalQuestion");
    const answerForm = document.getElementById("answerForm");
    const answerInput = document.getElementById("answerInput");
    const closeModalBtn = document.getElementById("closeModalBtn");
    const modalFeedback = document.getElementById("modalFeedback");

    function updateUI() {
        scoreSpan.textContent = String(currentScore);
        bubblesCountSpan.textContent = String(activeBubbles.length);
        renderBubbles();

        if (activeBubbles.length === 0) {
            let winMsg = document.querySelector(".win-toast");

            if (!winMsg) {
                winMsg = document.createElement("div");
                winMsg.className = "win-message win-toast";
                winMsg.textContent = "🎉 恭喜！你已经消除了所有知识点泡泡，继续保持学习状态。";
                bubblesGrid.parentNode.insertBefore(winMsg, bubblesGrid.nextSibling);
            }
        } else {
            const existingWin = document.querySelector(".win-toast");

            if (existingWin) {
                existingWin.remove();
            }
        }
    }

    function renderBubbles() {
        bubblesGrid.innerHTML = "";

        if (activeBubbles.length === 0) {
            const emptyDiv = document.createElement("div");
            emptyDiv.className = "empty-state";
            emptyDiv.textContent = "🌟 所有泡泡都已消除，点击下方按钮可以重新开始。";
            bubblesGrid.appendChild(emptyDiv);
            return;
        }

        activeBubbles.forEach((bubble) => {
            const bubbleButton = document.createElement("button");
            bubbleButton.type = "button";
            bubbleButton.className = "bubble";
            bubbleButton.setAttribute("data-type", bubble.category);
            bubbleButton.setAttribute("aria-label", `${bubble.name}，分类 ${bubble.category}，${bubble.points} 积分`);
            bubbleButton.style.setProperty("--float-delay", `${bubble.id * 0.14}s`);
            bubbleButton.innerHTML = `
                <span class="bubble-name">${escapeHtml(bubble.name)}</span>
                <span class="bubble-sub">${escapeHtml(bubble.category)} · 🧠 ${bubble.points}分</span>
            `;

            bubbleButton.addEventListener("click", () => {
                currentSelectedBubble = bubble;
                openModalForBubble(bubble);
            });

            bubblesGrid.appendChild(bubbleButton);
        });
    }

    function escapeHtml(str) {
        return String(str).replace(/[&<>]/g, function(match) {
            if (match === "&") return "&amp;";
            if (match === "<") return "&lt;";
            if (match === ">") return "&gt;";
            return match;
        });
    }

    function normalizeAnswer(value) {
        return value.trim().replace(/\s+/g, " ").toLowerCase();
    }

    function openModalForBubble(bubble) {
        if (!bubble) {
            return;
        }

        if (closeModalTimer) {
            clearTimeout(closeModalTimer);
            closeModalTimer = null;
        }

        lastFocusedElement = document.activeElement;
        modalBubbleNameSpan.textContent = `📌 ${bubble.name}（${bubble.category}）`;
        modalQuestionDiv.textContent = bubble.question;
        answerInput.value = "";
        modalFeedback.textContent = "";
        modalFeedback.style.color = "#2c3e2f";
        modal.style.display = "flex";
        modal.setAttribute("aria-hidden", "false");
        answerInput.focus();
    }

    function handleAnswerSubmission() {
        if (!currentSelectedBubble) {
            closeModal();
            return;
        }

        const rawAnswer = answerInput.value.trim();

        if (!rawAnswer) {
            modalFeedback.textContent = "✍️ 先输入答案再提交。";
            modalFeedback.style.color = "#b36b00";
            answerInput.focus();
            return;
        }

        const userAnswer = normalizeAnswer(rawAnswer);
        const correctAnswer = normalizeAnswer(currentSelectedBubble.answer);
        const isCorrect = userAnswer === correctAnswer;

        if (isCorrect) {
            const earnedPoints = currentSelectedBubble.points;
            const bubbleIdToRemove = currentSelectedBubble.id;
            const index = activeBubbles.findIndex((bubble) => bubble.id === bubbleIdToRemove);

            currentScore += earnedPoints;

            if (index !== -1) {
                activeBubbles.splice(index, 1);
            }

            modalFeedback.textContent = `✅ 回答正确，获得 ${earnedPoints} 积分！`;
            modalFeedback.style.color = "#2c5e2a";

            closeModalTimer = window.setTimeout(() => {
                closeModal();
                updateUI();
            }, 800);
            return;
        }

        modalFeedback.textContent = `❌ 答案“${rawAnswer}”不正确。正确答案是：“${currentSelectedBubble.answer}”。再试一次吧。`;
        modalFeedback.style.color = "#b33";
        answerInput.value = "";
        answerInput.focus();
    }

    function closeModal() {
        if (closeModalTimer) {
            clearTimeout(closeModalTimer);
            closeModalTimer = null;
        }

        modal.style.display = "none";
        modal.setAttribute("aria-hidden", "true");
        modalFeedback.textContent = "";
        currentSelectedBubble = null;

        if (lastFocusedElement && typeof lastFocusedElement.focus === "function") {
            lastFocusedElement.focus();
        }
    }

    function resetGame() {
        activeBubbles = KNOWLEDGE_BUBBLES.map((bubble) => ({ ...bubble }));
        currentScore = 0;
        closeModal();
        updateUI();
        window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function init() {
        resetGame();

        resetBtn.addEventListener("click", function() {
            resetGame();
        });

        answerForm.addEventListener("submit", function(event) {
            event.preventDefault();

            if (currentSelectedBubble) {
                handleAnswerSubmission();
            } else {
                closeModal();
            }
        });

        closeModalBtn.addEventListener("click", function() {
            closeModal();
        });

        modal.addEventListener("click", function(event) {
            if (event.target === modal) {
                closeModal();
            }
        });

        document.addEventListener("keydown", function(event) {
            if (event.key === "Escape" && modal.getAttribute("aria-hidden") === "false") {
                closeModal();
            }
        });
    }

    init();
</script>
</body>
</html>
