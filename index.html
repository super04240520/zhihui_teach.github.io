<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>入职训练营 · 泡泡消除</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:          #05101e;
      --panel:       #0b1928;
      --panel2:      #0f1f30;
      --border:      rgba(255,255,255,0.06);
      --c1:          #22d3ee;   /* 取信三要素 — cyan */
      --c2:          #fb7185;   /* 促单三心理 — rose */
      --c3:          #4ade80;   /* 促单逻辑   — green */
      --gold:        #fbbf24;
      --text:        #ddeeff;
      --dim:         rgba(221,238,255,0.38);
    }

    *, *::before, *::after {
      margin: 0; padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      font-family: 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', system-ui, sans-serif;
      padding: 32px 20px 52px;
      position: relative;
      overflow-x: hidden;
    }

    /* ── Atmosphere ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 55% 45% at 10% 10%,  rgba(34,211,238,.07) 0%, transparent 55%),
        radial-gradient(ellipse 45% 40% at 90% 85%,  rgba(251,113,133,.07) 0%, transparent 55%),
        radial-gradient(ellipse 35% 30% at 55% 55%,  rgba(74,222,128,.04)  0%, transparent 55%);
      pointer-events: none;
    }

    body::after {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(34,211,238,.016) 1px, transparent 1px),
        linear-gradient(90deg, rgba(34,211,238,.016) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
    }

    /* ── Container ── */
    .game-container {
      position: relative; z-index: 1;
      max-width: 1080px;
      margin: 0 auto;
    }

    /* ── Header ── */
    .game-header {
      text-align: center;
      margin-bottom: 36px;
    }

    .game-eyebrow {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: .35em;
      color: var(--c1);
      text-transform: uppercase;
      margin-bottom: 12px;
      opacity: .75;
    }

    .game-title {
      font-size: clamp(1.6rem, 4.2vw, 2.5rem);
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.02em;
      line-height: 1.15;
    }

    .game-title em {
      font-style: normal;
      background: linear-gradient(120deg, var(--c1) 0%, var(--c3) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .game-subtitle {
      margin-top: 8px;
      font-size: .8rem;
      color: var(--dim);
      letter-spacing: .06em;
    }

    /* ── Stats Bar ── */
    .stats-bar {
      display: flex;
      align-items: center;
      background: var(--panel);
      border: 1px solid var(--border);
      border-top: 2.5px solid var(--c1);
      border-radius: 16px;
      padding: 18px 32px;
      margin-bottom: 22px;
    }

    .stat-block { display: flex; align-items: center; gap: 14px; flex: 1; }
    .stat-block.right { justify-content: flex-end; }

    .stat-icon {
      width: 44px; height: 44px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.25rem; flex-shrink: 0;
    }
    .stat-icon.gold-bg { background: rgba(251,191,36,.1); }
    .stat-icon.cyan-bg { background: rgba(34,211,238,.08); }

    .stat-label {
      font-size: .64rem;
      color: var(--dim);
      letter-spacing: .14em;
      text-transform: uppercase;
      margin-bottom: 3px;
    }

    .stat-num {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.85rem;
      font-weight: 700;
      line-height: 1;
    }
    .stat-num.gold { color: var(--gold); text-shadow: 0 0 22px rgba(251,191,36,.45); }
    .stat-num.cyan { color: var(--c1);  text-shadow: 0 0 22px rgba(34,211,238,.45); }

    .stats-sep {
      width: 1px; height: 48px;
      background: var(--border);
      margin: 0 30px;
    }

    /* ── Legend ── */
    .legend-row {
      display: flex;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 36px;
    }

    .legend-chip {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 14px 6px 10px;
      border-radius: 999px;
      border: 1px solid;
      font-size: .73rem;
      font-weight: 600;
    }

    .legend-chip.lc1 { border-color: rgba(34,211,238,.3);  color: var(--c1); background: rgba(34,211,238,.05); }
    .legend-chip.lc2 { border-color: rgba(251,113,133,.3); color: var(--c2); background: rgba(251,113,133,.05); }
    .legend-chip.lc3 { border-color: rgba(74,222,128,.3);  color: var(--c3); background: rgba(74,222,128,.05); }

    .ldot {
      width: 7px; height: 7px;
      border-radius: 50%;
    }
    .lc1 .ldot { background: var(--c1); box-shadow: 0 0 7px var(--c1); }
    .lc2 .ldot { background: var(--c2); box-shadow: 0 0 7px var(--c2); }
    .lc3 .ldot { background: var(--c3); box-shadow: 0 0 7px var(--c3); }

    /* ── Bubbles Grid ── */
    .bubbles-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(152px, 175px));
      justify-content: center;
      gap: 30px 22px;
      min-height: 190px;
    }

    /* ── Bubble ── */
    .bubble {
      aspect-ratio: 1;
      border-radius: 50%;
      background: var(--panel2);
      border: 2px solid rgba(255,255,255,.07);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      cursor: pointer;
      padding: 16px 12px;
      position: relative;
      transition:
        transform .3s cubic-bezier(.34,1.56,.64,1),
        box-shadow .3s ease,
        border-color .3s ease;
      animation: bubbleIn .5s cubic-bezier(.34,1.56,.64,1) both;
    }

    .bubble:nth-child(1)  { animation-delay: .00s }
    .bubble:nth-child(2)  { animation-delay: .05s }
    .bubble:nth-child(3)  { animation-delay: .10s }
    .bubble:nth-child(4)  { animation-delay: .15s }
    .bubble:nth-child(5)  { animation-delay: .20s }
    .bubble:nth-child(6)  { animation-delay: .25s }
    .bubble:nth-child(7)  { animation-delay: .30s }
    .bubble:nth-child(8)  { animation-delay: .35s }
    .bubble:nth-child(9)  { animation-delay: .40s }

    @keyframes bubbleIn {
      from { transform: scale(.5) translateY(28px); opacity: 0; }
      to   { transform: scale(1) translateY(0);     opacity: 1; }
    }

    /* highlight sheen */
    .bubble::before {
      content: '';
      position: absolute;
      top: 10%; left: 18%;
      width: 28%; height: 18%;
      background: rgba(255,255,255,.045);
      border-radius: 50%;
      pointer-events: none;
    }

    /* outer pulse ring */
    .bubble::after {
      content: '';
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 1px solid;
      opacity: 0;
      transition: opacity .3s, inset .3s;
    }

    /* per-category colours */
    .bubble[data-type="取信三要素"] {
      border-color: rgba(34,211,238,.3);
      box-shadow: 0 6px 28px rgba(0,0,0,.5);
    }
    .bubble[data-type="取信三要素"]::after { border-color: rgba(34,211,238,.18); }
    .bubble[data-type="取信三要素"]:hover {
      border-color: var(--c1);
      box-shadow: 0 18px 44px rgba(0,0,0,.65), 0 0 28px rgba(34,211,238,.35), 0 0 70px rgba(34,211,238,.12);
      transform: scale(1.08) translateY(-6px);
    }
    .bubble[data-type="取信三要素"]:hover::after { opacity: 1; inset: -14px; }

    .bubble[data-type="促单三心理"] {
      border-color: rgba(251,113,133,.3);
      box-shadow: 0 6px 28px rgba(0,0,0,.5);
    }
    .bubble[data-type="促单三心理"]::after { border-color: rgba(251,113,133,.18); }
    .bubble[data-type="促单三心理"]:hover {
      border-color: var(--c2);
      box-shadow: 0 18px 44px rgba(0,0,0,.65), 0 0 28px rgba(251,113,133,.35), 0 0 70px rgba(251,113,133,.12);
      transform: scale(1.08) translateY(-6px);
    }
    .bubble[data-type="促单三心理"]:hover::after { opacity: 1; inset: -14px; }

    .bubble[data-type="促单逻辑"] {
      border-color: rgba(74,222,128,.3);
      box-shadow: 0 6px 28px rgba(0,0,0,.5);
    }
    .bubble[data-type="促单逻辑"]::after { border-color: rgba(74,222,128,.18); }
    .bubble[data-type="促单逻辑"]:hover {
      border-color: var(--c3);
      box-shadow: 0 18px 44px rgba(0,0,0,.65), 0 0 28px rgba(74,222,128,.35), 0 0 70px rgba(74,222,128,.12);
      transform: scale(1.08) translateY(-6px);
    }
    .bubble[data-type="促单逻辑"]:hover::after { opacity: 1; inset: -14px; }

    .bubble:active { transform: scale(.95) !important; transition-duration: .08s !important; }

    /* bubble internals */
    .bubble-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      margin-bottom: 10px;
      flex-shrink: 0;
    }
    .bubble[data-type="取信三要素"] .bubble-dot { background: var(--c1); box-shadow: 0 0 8px var(--c1); }
    .bubble[data-type="促单三心理"] .bubble-dot { background: var(--c2); box-shadow: 0 0 8px var(--c2); }
    .bubble[data-type="促单逻辑"]   .bubble-dot { background: var(--c3); box-shadow: 0 0 8px var(--c3); }

    .bubble-name {
      font-size: .88rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.3;
      margin-bottom: 7px;
      word-break: keep-all;
    }

    .bubble-cat {
      font-size: .61rem;
      color: var(--dim);
      letter-spacing: .04em;
    }

    .bubble-pts {
      position: absolute;
      bottom: 14px;
      font-family: 'Orbitron', sans-serif;
      font-size: .58rem;
      font-weight: 700;
      opacity: .75;
    }
    .bubble[data-type="取信三要素"] .bubble-pts { color: var(--c1); }
    .bubble[data-type="促单三心理"] .bubble-pts { color: var(--c2); }
    .bubble[data-type="促单逻辑"]   .bubble-pts { color: var(--c3); }

    /* ── Empty state ── */
    .empty-state {
      grid-column: 1 / -1;
      padding: 64px 24px;
      text-align: center;
      color: var(--dim);
      font-size: 1.05rem;
      line-height: 1.8;
    }

    /* ── Win banner ── */
    .win-message {
      margin: 24px 0 0;
      padding: 22px 28px;
      background: linear-gradient(135deg, rgba(74,222,128,.07), rgba(251,191,36,.07));
      border: 1px solid rgba(74,222,128,.25);
      border-radius: 16px;
      color: var(--c3);
      text-align: center;
      font-size: .98rem;
      font-weight: 700;
      line-height: 1.85;
      text-shadow: 0 0 24px rgba(74,222,128,.35);
    }

    /* ── Bottom section ── */
    .bottom-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      margin-top: 38px;
    }

    .reset-btn {
      background: var(--panel);
      border: 1px solid rgba(255,255,255,.1);
      color: var(--text);
      padding: 14px 48px;
      border-radius: 999px;
      font-size: .88rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: .06em;
      transition: border-color .2s, color .2s, box-shadow .2s;
    }
    .reset-btn:hover {
      border-color: rgba(34,211,238,.4);
      color: var(--c1);
      box-shadow: 0 0 22px rgba(34,211,238,.12);
    }
    .reset-btn:active { transform: scale(.97); }

    footer {
      font-size: .68rem;
      color: var(--dim);
      text-align: center;
      letter-spacing: .06em;
      line-height: 1.7;
    }

    /* ── Modal ── */
    .modal {
      display: none;
      position: fixed; inset: 0;
      background: rgba(3,8,18,.9);
      backdrop-filter: blur(18px);
      justify-content: center;
      align-items: center;
      z-index: 1000;
      padding: 20px;
    }

    .modal-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-top: 3px solid var(--c1);
      max-width: 460px;
      width: 100%;
      border-radius: 20px;
      padding: 32px 28px 28px;
      text-align: center;
      box-shadow: 0 40px 80px rgba(0,0,0,.95), 0 0 60px rgba(34,211,238,.07);
      animation: cardPop .24s cubic-bezier(.2,.9,.4,1.1);
    }

    @keyframes cardPop {
      from { transform: scale(.88) translateY(14px); opacity: 0; }
      to   { transform: scale(1) translateY(0);      opacity: 1; }
    }

    .modal-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: 'Orbitron', sans-serif;
      font-size: .58rem;
      letter-spacing: .22em;
      color: var(--c1);
      padding: 5px 12px;
      border: 1px solid rgba(34,211,238,.22);
      border-radius: 4px;
      margin-bottom: 16px;
      text-transform: uppercase;
    }

    .modal-bubble-name {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 18px;
    }

    .modal-question {
      background: rgba(255,255,255,.025);
      border: 1px solid rgba(255,255,255,.065);
      border-left: 3px solid var(--c1);
      padding: 17px 20px;
      border-radius: 12px;
      font-size: .98rem;
      color: var(--text);
      line-height: 1.65;
      text-align: left;
      margin-bottom: 18px;
    }

    .modal-input {
      width: 100%;
      padding: 13px 20px;
      background: rgba(255,255,255,.035);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 10px;
      font-size: 1rem;
      color: var(--text);
      font-family: inherit;
      outline: none;
      text-align: center;
      caret-color: var(--c1);
      transition: border-color .2s, box-shadow .2s;
    }
    .modal-input:focus {
      border-color: rgba(34,211,238,.42);
      box-shadow: 0 0 0 3px rgba(34,211,238,.08);
    }
    .modal-input::placeholder { color: rgba(221,238,255,.2); }

    .modal-buttons {
      display: flex;
      gap: 12px;
      margin-top: 18px;
    }

    .modal-btn {
      flex: 1;
      padding: 13px 16px;
      border-radius: 10px;
      border: 1px solid;
      font-size: .88rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: all .18s;
      letter-spacing: .02em;
    }

    .modal-btn.confirm {
      background: rgba(74,222,128,.08);
      border-color: rgba(74,222,128,.32);
      color: var(--c3);
    }
    .modal-btn.confirm:hover {
      background: rgba(74,222,128,.15);
      box-shadow: 0 0 22px rgba(74,222,128,.18);
    }

    .modal-btn.cancel {
      background: rgba(255,255,255,.025);
      border-color: rgba(255,255,255,.08);
      color: var(--dim);
    }
    .modal-btn.cancel:hover {
      border-color: rgba(255,255,255,.16);
      color: var(--text);
    }

    .modal-btn:active { transform: scale(.97); }

    .feedback {
      min-height: 2.8rem;
      font-size: .85rem;
      font-weight: 600;
      margin-top: 16px;
      line-height: 1.6;
      padding: 0 4px;
    }

    /* ── Responsive ── */
    @media (max-width: 520px) {
      .stats-bar { flex-wrap: wrap; gap: 10px; justify-content: center; }
      .stats-sep { display: none; }
      .stat-block.right { justify-content: center; }
      .game-container { padding: 0; }
    }
  </style>
</head>
<body>

<div class="game-container">

  <!-- Header -->
  <div class="game-header">
    <div class="game-eyebrow">ONBOARDING TRAINING CAMP</div>
    <h1 class="game-title">入职训练营 · <em>泡泡消除</em></h1>
    <p class="game-subtitle">点击泡泡 → 答题掌握知识点 → 消除得分</p>
  </div>

  <!-- Stats bar -->
  <div class="stats-bar">
    <div class="stat-block">
      <div class="stat-icon gold-bg">🏅</div>
      <div>
        <div class="stat-label">入职积分</div>
        <div class="stat-num gold" id="scoreValue">0</div>
      </div>
    </div>
    <div class="stats-sep"></div>
    <div class="stat-block right">
      <div>
        <div class="stat-label" style="text-align:right">待掌握</div>
        <div class="stat-num cyan" id="bubblesCount">0</div>
      </div>
      <div class="stat-icon cyan-bg">🫧</div>
    </div>
  </div>

  <!-- Category legend -->
  <div class="legend-row">
    <div class="legend-chip lc1"><div class="ldot"></div>取信三要素</div>
    <div class="legend-chip lc2"><div class="ldot"></div>促单三心理</div>
    <div class="legend-chip lc3"><div class="ldot"></div>促单逻辑</div>
  </div>

  <!-- Bubble grid -->
  <div id="bubblesGrid" class="bubbles-grid"></div>

  <!-- Bottom -->
  <div class="bottom-section">
    <button id="resetGameBtn" class="reset-btn">⟳ &nbsp;重来一次 · 强化训练</button>
    <footer>每个泡泡 +2 积分 · 全部消除解锁入职专家称号</footer>
  </div>

</div>

<!-- Question Modal -->
<div id="questionModal" class="modal">
  <div class="modal-card">
    <div class="modal-tag">🧠 &nbsp;新员工训练营</div>
    <div id="modalBubbleName" class="modal-bubble-name"></div>
    <div id="modalQuestion" class="modal-question"></div>
    <input type="text" id="answerInput" class="modal-input" placeholder="输入你的答案..." autocomplete="off">
    <div class="modal-buttons">
      <button id="submitAnswerBtn" class="modal-btn confirm">🎯 &nbsp;消除泡泡 +2分</button>
      <button id="closeModalBtn" class="modal-btn cancel">再想想</button>
    </div>
    <div id="modalFeedback" class="feedback"></div>
  </div>
</div>

<script>
  // --------------------------------------------------------------
  // 知识点库：取信三要素 + 促单三心理（心理暗示）+ 促单逻辑YAB
  // 每个泡泡统一 2 积分
  // --------------------------------------------------------------
  const KNOWLEDGE_BUBBLES = [
      // ========= 取信三要素 =========
      { id: 1, name: "专业化介绍", category: "取信三要素",
        question: "\u201C取信三要素\u201D中，让客户觉得你非常懂行、有资质、能解决痛点，指的是哪一个要素？",
        answer: "专业化介绍", points: 2 },
      { id: 2, name: "第三方评价", category: "取信三要素",
        question: "取信三要素里，利用客户见证、成功案例、行业认证来建立信任，被称为？",
        answer: "第三方评价", points: 2 },
      { id: 3, name: "场景化介绍", category: "取信三要素",
        question: "用具体画面描绘产品使用后的效果，让客户\u201C看见\u201D价值，这属于取信三要素中的？",
        answer: "场景化介绍", points: 2 },

      // ========= 促单三心理（锚点效应、损失厌恶、心理暗示） =========
      { id: 4, name: "锚点效应", category: "促单三心理",
        question: "先展示高价产品作为对比，让主推产品显得更划算，这种影响客户决策的心理效应叫做？",
        answer: "锚点效应", points: 2 },
      { id: 5, name: "损失厌恶", category: "促单三心理",
        question: "人们面对同样数量的收益和损失时，认为损失更加难以忍受。这种心理称为？",
        answer: "损失厌恶", points: 2 },
      { id: 6, name: "心理暗示", category: "促单三心理",
        question: "通过语言、动作、环境等间接影响客户潜意识，使其不自觉地接受观点，这种心理技巧称为？",
        answer: "心理暗示", points: 2 },

      // ========= 促单逻辑 YAB (yes-and-but) =========
      { id: 7, name: "YES 认可观点", category: "促单逻辑",
        question: "YAB促单逻辑中，第一步需要先表示理解和认同客户，这一步通常称为？(提示：英文单词)",
        answer: "yes", points: 2 },
      { id: 8, name: "AND 解释疑问", category: "促单逻辑",
        question: "在YAB逻辑框架里，对客户疑问加以延伸解释、提供更多信息的是哪个词？",
        answer: "and", points: 2 },
      { id: 9, name: "BUT 转折下单", category: "促单逻辑",
        question: "YAB最后一步，温和而坚定地引导客户成交或采取行动，使用哪个转折词？",
        answer: "but", points: 2 }
  ];

  // 游戏状态
  let activeBubbles = [];
  let currentScore = 0;
  let currentSelectedBubble = null;

  // DOM 元素
  const bubblesGrid      = document.getElementById('bubblesGrid');
  const scoreSpan        = document.getElementById('scoreValue');
  const bubblesCountSpan = document.getElementById('bubblesCount');
  const resetBtn         = document.getElementById('resetGameBtn');
  const modal            = document.getElementById('questionModal');
  const modalBubbleNameSpan = document.getElementById('modalBubbleName');
  const modalQuestionDiv = document.getElementById('modalQuestion');
  const answerInput      = document.getElementById('answerInput');
  const submitBtn        = document.getElementById('submitAnswerBtn');
  const closeModalBtn    = document.getElementById('closeModalBtn');
  const modalFeedback    = document.getElementById('modalFeedback');

  function updateUI() {
      scoreSpan.innerText        = currentScore;
      bubblesCountSpan.innerText = activeBubbles.length;
      renderBubbles();

      if (activeBubbles.length === 0) {
          let winDiv = document.querySelector('.win-toast-sales');
          if (!winDiv) {
              const msg = document.createElement('div');
              msg.className = 'win-message win-toast-sales';
              msg.innerHTML = '🏆 恭喜完成入职必修课！<br>✅ 掌握取信三要素、促单三心理 & YAB 逻辑<br>获得全部入职积分！';
              bubblesGrid.parentNode.insertBefore(msg, bubblesGrid.nextSibling);
          }
      } else {
          const existingWin = document.querySelector('.win-toast-sales');
          if (existingWin) existingWin.remove();
      }
  }

  function renderBubbles() {
      bubblesGrid.innerHTML = '';
      if (activeBubbles.length === 0) {
          const emptyDiv = document.createElement('div');
          emptyDiv.className = 'empty-state';
          emptyDiv.innerHTML = '✨ 所有入职技能均已点亮！<br>点击重置继续强化肌肉记忆';
          bubblesGrid.appendChild(emptyDiv);
          return;
      }

      activeBubbles.forEach(bubble => {
          const bubbleDiv = document.createElement('div');
          bubbleDiv.className = 'bubble';
          bubbleDiv.setAttribute('data-type', bubble.category);
          bubbleDiv.innerHTML = `
              <div class="bubble-dot"></div>
              <div class="bubble-name">${escapeHtml(bubble.name)}</div>
              <div class="bubble-cat">${escapeHtml(bubble.category)}</div>
              <div class="bubble-pts">+${bubble.points} PTS</div>
          `;
          bubbleDiv.addEventListener('click', (e) => {
              e.stopPropagation();
              currentSelectedBubble = bubble;
              openModalForBubble(bubble);
          });
          bubblesGrid.appendChild(bubbleDiv);
      });
  }

  function escapeHtml(str) {
      return str.replace(/[&<>]/g, function(m) {
          if (m === '&') return '&amp;';
          if (m === '<') return '&lt;';
          if (m === '>') return '&gt;';
          return m;
      });
  }

  function openModalForBubble(bubble) {
      if (!bubble) return;
      modalBubbleNameSpan.innerHTML = `📘 &nbsp;${escapeHtml(bubble.name)} &nbsp;·&nbsp; ${escapeHtml(bubble.category)}`;
      modalQuestionDiv.innerText = bubble.question;
      answerInput.value = '';
      modalFeedback.innerHTML = '';
      modalFeedback.style.color = '';
      modal.style.display = 'flex';
      answerInput.focus();
  }

  function handleAnswerSubmission() {
      if (!currentSelectedBubble) { closeModal(); return; }
      const userAnswer    = answerInput.value.trim().toLowerCase();
      const correctAnswer = currentSelectedBubble.answer.toLowerCase();

      let isMatch = false;
      if (userAnswer === correctAnswer) {
          isMatch = true;
      } else {
          const bubbleName = currentSelectedBubble.name;
          if (bubbleName === "YES 认可观点" && (userAnswer === "yes" || userAnswer === "是" || userAnswer === "认可观点")) isMatch = true;
          else if (bubbleName === "AND 解释疑问" && (userAnswer === "and" || userAnswer === "并且" || userAnswer === "解释疑问")) isMatch = true;
          else if (bubbleName === "BUT 转折下单" && (userAnswer === "but" || userAnswer === "但是" || userAnswer === "转折下单")) isMatch = true;
          else if (bubbleName === "锚点效应" && (userAnswer === "锚定效应" || userAnswer === "锚点")) isMatch = true;
          else if (bubbleName === "损失厌恶" && (userAnswer === "损失规避" || userAnswer === "损失厌恶心理")) isMatch = true;
          else if (bubbleName === "心理暗示" && (userAnswer === "暗示" || userAnswer === "心理暗示法")) isMatch = true;
          else if (bubbleName === "专业化介绍" && (userAnswer === "专业介绍" || userAnswer === "专业形象")) isMatch = true;
          else if (bubbleName === "第三方评价" && (userAnswer === "第三方背书" || userAnswer === "客户评价")) isMatch = true;
          else if (bubbleName === "场景化介绍" && (userAnswer === "场景介绍" || userAnswer === "场景化")) isMatch = true;
      }

      if (isMatch) {
          const earned = currentSelectedBubble.points;
          currentScore += earned;
          const idx = activeBubbles.findIndex(b => b.id === currentSelectedBubble.id);
          if (idx !== -1) activeBubbles.splice(idx, 1);
          modalFeedback.innerHTML = `✅ 漂亮！"${escapeHtml(currentSelectedBubble.name)}" 掌握到位！+${earned} 入职积分 🎉`;
          modalFeedback.style.color = 'var(--c3)';
          setTimeout(() => {
              closeModal();
              updateUI();
              currentSelectedBubble = null;
          }, 800);
      } else {
          modalFeedback.innerHTML = `❌ 答案"${escapeHtml(answerInput.value)}"不对哦。正确答案是："${escapeHtml(currentSelectedBubble.answer)}"。再复习一下！`;
          modalFeedback.style.color = 'var(--c2)';
          answerInput.value = '';
          answerInput.focus();
      }
  }

  function closeModal() {
      modal.style.display = 'none';
      currentSelectedBubble = null;
      modalFeedback.innerHTML = '';
  }

  function resetGame() {
      activeBubbles = KNOWLEDGE_BUBBLES.map(b => ({ ...b }));
      currentScore = 0;
      closeModal();
      updateUI();
  }

  function init() {
      resetGame();

      resetBtn.addEventListener('click', resetGame);

      submitBtn.addEventListener('click', (e) => {
          e.preventDefault();
          if (currentSelectedBubble) handleAnswerSubmission();
          else closeModal();
      });

      closeModalBtn.addEventListener('click', closeModal);

      answerInput.addEventListener('keypress', (e) => {
          if (e.key === 'Enter') {
              e.preventDefault();
              if (currentSelectedBubble) handleAnswerSubmission();
          }
      });

      modal.addEventListener('click', (e) => {
          if (e.target === modal) closeModal();
      });
  }

  init();
</script>
</body>
</html>
